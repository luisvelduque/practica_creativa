# Job de carga de distancias en Cassandra.
# Ejecuta el script import_distances_cassandra.py una sola vez al desplegar.
# Equivale al servicio distances-init del docker-compose.
# Usa la misma imagen Flask (practica-flask:latest) que ya tiene el script y las dependencias.
# IMPORTANTE: La imagen debe estar construida y disponible en el cluster antes de aplicar este Job.
apiVersion: batch/v1
kind: Job
metadata:
  name: distances-init
  namespace: flight-prediction
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: distances-init
          image: practica-flask:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - resources/import_distances_cassandra.py
          env:
            - name: CASSANDRA_HOST
              value: "cassandra"
