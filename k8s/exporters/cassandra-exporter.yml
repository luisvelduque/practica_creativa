# Cassandra Exporter — expone métricas de Cassandra en formato Prometheus.
# Prometheus las scrapea desde cassandra-exporter.flight-prediction:9500
# Equivale al servicio cassandra-exporter del docker-compose.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cassandra-exporter
  namespace: flight-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cassandra-exporter
  template:
    metadata:
      labels:
        app: cassandra-exporter
    spec:
      containers:
        - name: cassandra-exporter
          image: criteord/cassandra_exporter:latest
          ports:
            - containerPort: 9500
          env:
            - name: CASSANDRA_HOST
              value: "cassandra"
            - name: CASSANDRA_PORT
              value: "9042"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra-exporter
  namespace: flight-prediction
spec:
  selector:
    app: cassandra-exporter
  ports:
    - port: 9500
      targetPort: 9500
  type: ClusterIP
