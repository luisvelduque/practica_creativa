# Kafka Exporter — expone métricas de Kafka en formato Prometheus.
# Prometheus las scrapea desde kafka-exporter.flight-prediction:9308
# Equivale al servicio kafka-exporter del docker-compose.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: flight-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:latest
          args:
            - "--kafka.server=kafka:9092"
          ports:
            - containerPort: 9308
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: flight-prediction
spec:
  selector:
    app: kafka-exporter
  ports:
    - port: 9308
      targetPort: 9308
  type: ClusterIP
