services:
    # Cassandra
    cassandra:
        image: cassandra:4.1
        ports:
          - "9042:9042"
        volumes:
        - cassandra_data:/var/lib/cassandra
        healthcheck:
          test: ["CMD", "cqlsh", "-e", "DESCRIBE KEYSPACES"]
          interval: 30s
          timeout: 10s
          retries: 5

    # MinIO
    minio:
      image: quay.io/minio/minio
      ports:
        - "9000:9000"
        - "9001:9001"
      environment:
        MINIO_ROOT_USER: minioadmin
        MINIO_ROOT_PASSWORD: minioadmin
      volumes:
        - minio_data:/data
      command: server /data --console-address ":9001"

    #Kakfa
    kafka:
      image: apache/kafka:3.8.0
      hostname: kafka
      ports:
        - "9092:9092"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk


    #MongoDB
    mongodb:
      image: mongo:7.0
      ports:
        - "27017:27017"
      volumes:
        - mongodb_data:/data/db

    #Flask
    cassandra-init:
      image: cassandra:4.1
      volumes:
        - ./resources/init_cassandra.cql:/init.cql
      command: >
        bash -c "sleep 10 && cqlsh cassandra -f /init.cql"
      depends_on:
        cassandra:
          condition: service_healthy

    kafka-init:
      image: apache/kafka:3.8.0
      command: >
        bash -c "
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic flight-delay-ml-request --partitions 1 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic flight-delay-ml-response --partitions 1 --replication-factor 1
        "
      depends_on:
        - kafka

    distances-init:
      build: .
      command: python resources/import_distances_cassandra.py
      environment:
        CASSANDRA_HOST: cassandra
      volumes:
        - ./data:/app/data
      depends_on:
        cassandra:
          condition: service_healthy
        cassandra-init:
          condition: service_completed_successfully

    flask:
      build: .
      ports:
        - "5001:5001"
      environment:
        MONGO_HOST: mongodb
        PROJECT_HOME: /app
        CASSANDRA_HOST: cassandra
        KAFKA_HOST: kafka
      depends_on:
        - kafka
        - cassandra
        - mongodb

    #Spark
    spark-master:
      image: apache/spark:3.5.3
      entrypoint: /opt/spark/bin/spark-class
      command: org.apache.spark.deploy.master.Master
      ports:
        - "8080:8080"
        - "7077:7077"

    spark-worker:
      image: apache/spark:3.5.3
      entrypoint: /opt/spark/bin/spark-class
      command: org.apache.spark.deploy.worker.Worker spark://spark-master:7077
      depends_on:
        - spark-master

    spark-submit:
      image: apache/spark:3.5.3
      entrypoint: /opt/spark/bin/spark-submit
      command: >
        --master spark://spark-master:7077
        --class es.upm.dit.ging.predictor.MakePrediction
        /app/flight_prediction-assembly-0.1.jar
      environment:
        BASE_PATH: /app
        CASSANDRA_HOST: cassandra
      volumes:
        - ./flight_prediction/target/scala-2.12/flight_prediction-assembly-0.1.jar:/app/flight_prediction-assembly-0.1.jar
        - ./models:/app/models
      depends_on:
        spark-master:
          condition: service_started
        spark-worker:
          condition: service_started
        kafka:
          condition: service_started
        cassandra:
          condition: service_healthy
        cassandra-init:
          condition: service_completed_successfully
        kafka-init:
          condition: service_completed_successfully

volumes:
  cassandra_data:
  minio_data:
  mongodb_data:

