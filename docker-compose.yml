services:
    # Cassandra
    cassandra:
        image: cassandra:4.1
        ports:
          - "9042:9042"
        volumes:
        - cassandra_data:/var/lib/cassandra
        healthcheck:
          test: ["CMD", "cqlsh", "-e", "DESCRIBE KEYSPACES"]
          interval: 30s
          timeout: 10s
          retries: 5

    # MinIO
    minio:
      image: quay.io/minio/minio
      ports:
        - "9000:9000"
        - "9001:9001"
      environment:
        MINIO_ROOT_USER: minioadmin
        MINIO_ROOT_PASSWORD: minioadmin
      volumes:
        - minio_data:/data
      command: server /data --console-address ":9001"
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
        interval: 30s
        timeout: 10s
        retries: 5


    #Kakfa
    kafka:
      image: apache/kafka:3.8.0
      hostname: kafka
      ports:
        - "9092:9092"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk


    #MongoDB
    mongodb:
      image: mongo:7.0
      ports:
        - "27017:27017"
      environment:
        MONGO_INITDB_ROOT_USERNAME: admin
        MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      volumes:
        - mongodb_data:/data/db
      healthcheck:
        test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
        interval: 30s
        timeout: 10s
        retries: 5

    cassandra-init:
      image: cassandra:4.1
      volumes:
        - ./resources/init_cassandra.cql:/init.cql
      command: > 
        bash -c "
          until cqlsh cassandra -e 'DESCRIBE KEYSPACES' > /dev/null 2>&1; do
            echo 'Esperando a Cassandra...'
            sleep 2
          done &&
          cqlsh cassandra -f /init.cql
        "
      depends_on:
        cassandra:
          condition: service_healthy

    kafka-init:
      image: apache/kafka:3.8.0
      command: >
        bash -c "
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic flight-delay-ml-request --partitions 1 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic flight-delay-ml-response --partitions 1 --replication-factor 1
        "
      depends_on:
        - kafka

    distances-init:
      build: .
      command: python resources/import_distances_cassandra.py
      environment:
        CASSANDRA_HOST: cassandra
      volumes:
        - ./data:/app/data
      depends_on:
        cassandra:
          condition: service_healthy
        cassandra-init:
          condition: service_completed_successfully

    flask:
      build: .
      ports:
        - "5001:5001"
      environment:
        MONGO_HOST: mongodb
        MONGO_USER: admin
        MONGO_PASSWORD: ${MONGO_PASSWORD}
        PROJECT_HOME: /app
        CASSANDRA_HOST: cassandra
        KAFKA_HOST: kafka
        MINIO_ENDPOINT: http://minio:9000
        AWS_ACCESS_KEY_ID: minioadmin
        AWS_SECRET_ACCESS_KEY: minioadmin
        MLFLOW_S3_ENDPOINT_URL: http://minio:9000
        MLFLOW_TRACKING_URI: http://mlflow:5000
      volumes:
        - ./data:/app/data
        - ./models:/app/models
        - ./resources:/app/resources
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
        interval: 30s
        timeout: 10s
        retries: 5
        start_period: 15s   # da tiempo a que Flask arranque
      depends_on:
        kafka:
          condition: service_started
        cassandra:
          condition: service_healthy
        mongodb:
          condition: service_healthy

    #Spark
    spark-master:
      image: apache/spark:3.5.3
      entrypoint: /opt/spark/bin/spark-class
      command: org.apache.spark.deploy.master.Master
      ports:
        - "8080:8080"
        - "7077:7077"

    spark-worker:
      image: apache/spark:3.5.3
      entrypoint: /opt/spark/bin/spark-class
      command: org.apache.spark.deploy.worker.Worker spark://spark-master:7077
      deploy:
        replicas: 3
        resources:
          limits:
            cpus: '2'
            memory: 2g
      depends_on:
        - spark-master

    spark-submit:
      image: apache/spark:3.5.3
      entrypoint: /opt/spark/bin/spark-submit
      command: >
        --master spark://spark-master:7077
        --conf spark.cassandra.connection.host=cassandra
        --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
        --conf spark.hadoop.fs.s3a.access.key=minioadmin
        --conf spark.hadoop.fs.s3a.secret.key=minioadmin
        --conf spark.hadoop.fs.s3a.path.style.access=true
        --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
        --class es.upm.dit.ging.predictor.MakePrediction
        /app/flight_prediction-assembly-0.1.jar
      environment:
        BASE_PATH: /app
        CASSANDRA_HOST: cassandra
        MINIO_ENDPOINT: http://minio:9000
        MINIO_ACCESS_KEY: minioadmin
        MINIO_SECRET_KEY: minioadmin
        MODELS_PATH: s3a://lakehouse/models
      volumes:
        - ./flight_prediction/target/scala-2.12/flight_prediction-assembly-0.1.jar:/app/flight_prediction-assembly-0.1.jar
        - ./models:/app/models
      depends_on:
        spark-master:
          condition: service_started
        spark-worker:
          condition: service_started
        kafka:
          condition: service_started
        cassandra:
          condition: service_healthy
        cassandra-init:
          condition: service_completed_successfully
        kafka-init:
          condition: service_completed_successfully
    
    prometheus:
      image: prom/prometheus
      ports:
        - "9090:9090"
      volumes:
        - ./prometheus.yml:/etc/prometheus/prometheus.yml
      depends_on:
        flask:
          condition: service_healthy

    grafana:
      image: grafana/grafana
      ports:
        - "3000:3000"
      volumes:
        - ./grafana/provisioning:/etc/grafana/provisioning
        - ./grafana/dashboards:/var/lib/grafana/dashboards
      depends_on:
        - prometheus

    kafka-exporter:
      image: danielqsj/kafka-exporter:latest
      ports:
        - "9308:9308"
      command: --kafka.server=kafka:9092
      depends_on:
        - kafka
        
    cassandra-exporter:
      image: criteord/cassandra_exporter:latest
      ports:
        - "9500:9500"
      environment:
        CASSANDRA_HOST: cassandra
        CASSANDRA_PORT: 9042
      depends_on:
        - cassandra

    # MLflow — tracking de experimentos de ML
    # UI disponible en http://localhost:5000
    mlflow:
      image: ghcr.io/mlflow/mlflow:v2.11.0
      ports:
        - "5000:5000"
      command: >
        mlflow server
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root s3://mlflow/
        --host 0.0.0.0
      environment:
        MLFLOW_S3_ENDPOINT_URL: http://minio:9000
        AWS_ACCESS_KEY_ID: minioadmin
        AWS_SECRET_ACCESS_KEY: minioadmin
      depends_on:
        minio:
          condition: service_healthy

    postgres:
      image: postgres:15
      environment:
        POSTGRES_USER: airflow
        POSTGRES_PASSWORD: airflow
        POSTGRES_DB: airflow
      volumes:
        - postgres_data:/var/lib/postgresql/data

    # Airflow — inicialización de la base de datos (se ejecuta una vez y termina)
    airflow-init:
      image: apache/airflow:2.9.0
      entrypoint: /bin/bash
      command:
        - -c
        - |
          airflow db init &&
          airflow users create \
            --username admin \
            --password admin \
            --firstname Admin \
            --lastname Admin \
            --role Admin \
            --email admin@example.com
      environment:
        AIRFLOW__CORE__EXECUTOR: LocalExecutor
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
        AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      volumes:
        - ./airflow/dags:/opt/airflow/dags
      depends_on:
        - postgres

    airflow-webserver:
      image: apache/airflow:2.9.0
      command: webserver
      ports:
        - "8081:8080"
      user: "0:0"
      environment:
        AIRFLOW__CORE__EXECUTOR: LocalExecutor
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
        AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      volumes:
        - ./airflow/dags:/opt/airflow/dags
        - .:/app
        - /var/run/docker.sock:/var/run/docker.sock
      depends_on:
        airflow-init:
          condition: service_completed_successfully

    airflow-scheduler:
      image: apache/airflow:2.9.0
      command: scheduler
      user: "0:0"
      environment:
        AIRFLOW__CORE__EXECUTOR: LocalExecutor
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
        AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      volumes:
        - ./airflow/dags:/opt/airflow/dags
        - .:/app
        - /var/run/docker.sock:/var/run/docker.sock
      depends_on:
        airflow-init:
          condition: service_completed_successfully

volumes:
  cassandra_data:
  minio_data:
  mongodb_data:
  postgres_data:

